name: main-test

on: 
  push:
    branches: [main, develop]

  pull_request:
    branches: 
      - main
      - develop
      - 'feature/**'
      - 'feat/**'

jobs:
  my-test:
    runs-on: ubuntu-latest
    steps:
        - name: saludo desde github actions
          run: echo "bienvenido este es mi test"

        - name: info del runner
          run: | 
            echo "runner: $RUNNER_OS"
            echo "git: $(git --version)"
            echo "python3: $(python3 --version)"
            echo "fecha: $(date)"
          
        - name: tipo de evento
          if: github.event_name == 'push'
          run: echo "es un evento push"

        - name: tipo de rama y evento
          if: github.event_name == 'push' && github.ref == 'refs/heads/name'
          run: echo "es la ramam main y se hizo un evento push"

        - name: todo funciona bien
          if: success()
          run: echo "todo esta success"

          
      


          
