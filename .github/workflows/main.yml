name: test-app

on:
  push:
      branches:
        - main
  
  pull_request:
      branches:
        - main 
        - 'features/**'

jobs:
  test-app:
    runs-on: ubuntu-24.04
    steps:
      - name: descargar app
        uses: actions/checkout@v4

      - name: instalar python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: instalar dependencias de la app     
        run: |
          python3 -m pip --upgrade pip 
          pip install -r requirements.txt

      - name: ejecutar app
        run: | 
          flask run --app app --localhost=0.0.0.0 --port=5000
        

        
